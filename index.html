<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progres Orderan — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; background:#0b0f1a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
.card { background:#111827; border:1px solid #1e2d45; border-radius:20px; padding:2.5rem; width:100%; max-width:400px; box-shadow:0 24px 64px rgba(0,0,0,0.5); transition:opacity 0.2s; }
.logo { font-size:26px; font-weight:800; color:#e8edf5; margin-bottom:0.2rem; letter-spacing:-0.5px; }
.logo span { color:#3b82f6; }
.sub { font-size:13px; color:#5b7394; margin-bottom:2rem; }
label { display:block; font-size:11px; font-weight:600; color:#5b7394; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
input { width:100%; padding:11px 14px; background:#0b0f1a; border:1px solid #1e2d45; border-radius:10px; color:#e8edf5; font-size:14px; outline:none; transition:border-color 0.15s; font-family:'Plus Jakarta Sans',sans-serif; }
input:focus { border-color:#3b82f6; background:#0f1520; }
.btn { width:100%; padding:12px; background:#3b82f6; color:#fff; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; margin-top:1.25rem; transition:all 0.15s; font-family:'Plus Jakarta Sans',sans-serif; box-shadow:0 4px 14px rgba(59,130,246,0.3); }
.btn:hover { background:#2563eb; transform:translateY(-1px); box-shadow:0 6px 18px rgba(59,130,246,0.4); }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }
.field { margin-bottom:1rem; }
.err-msg { font-size:12px; margin-top:0.5rem; display:none; padding:8px 12px; border-radius:8px; color:#fb7185; background:rgba(244,63,94,0.1); border:1px solid rgba(244,63,94,0.2); }
.divider { display:flex; align-items:center; gap:12px; margin:1.5rem 0; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:#1e2d45; }
.divider span { font-size:11px; color:#5b7394; }
.reg-link { font-size:12px; color:#5b7394; text-align:center; margin-top:1.25rem; }
.reg-link a { color:#3b82f6; text-decoration:none; font-weight:600; }
.reg-link a:hover { color:#60a5fa; text-decoration:underline; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">Progres<span>Orderan</span></div>
  <div class="sub">Monitor status pengiriman orderan</div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="contoh: ani" autocomplete="username" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
  </div>
  <div class="err-msg" id="error-msg"></div>
  <button class="btn" id="btn-login" onclick="login()">Masuk</button>

  <div class="reg-link">Belum punya akun CS? <a href="/register.html">Daftar di sini</a></div>
</div>
<script>
const DOMAIN = '@internal.app';
let sb = null;
const card = document.getElementById('card');
card.style.opacity = '0.5';
card.style.pointerEvents = 'none';

async function getConfig() {
  const cached = sessionStorage.getItem('po_cfg');
  if (cached) return JSON.parse(cached);
  const res = await fetch('/api/config');
  if (!res.ok) throw new Error('Gagal memuat konfigurasi server.');
  const cfg = await res.json();
  sessionStorage.setItem('po_cfg', JSON.stringify(cfg));
  return cfg;
}

async function initApp() {
  try {
    const cfg = await getConfig();
    sb = supabase.createClient(cfg.authUrl, cfg.authKey);
    const { data } = await sb.auth.getSession();
    if (data.session) {
      const meta = data.session.user?.user_metadata || {};
      sessionStorage.setItem('po_cs_name', meta.cs_name || '');
      sessionStorage.setItem('po_username', meta.username || '');
      sessionStorage.setItem('po_role', meta.role || 'cs');
      sessionStorage.setItem('po_team', meta.team || '');
      const role = meta.role || 'cs';
      window.location.href = (role === 'spv' || role === 'admin') ? '/spv.html' : '/app.html';
      return;
    }
  } catch(e) {
    const el = document.getElementById('error-msg');
    el.textContent = e.message; el.style.display = 'block';
  }
  card.style.opacity = '1';
  card.style.pointerEvents = 'auto';
}
initApp();

async function login() {
  if (!sb) return;
  const username = document.getElementById('username').value.trim().toLowerCase();
  const pass     = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (!username) { errEl.textContent='Username tidak boleh kosong'; errEl.style.display='block'; return; }
  if (!pass)     { errEl.textContent='Password tidak boleh kosong'; errEl.style.display='block'; return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Memproses...';
  const { data, error } = await sb.auth.signInWithPassword({ email: username + DOMAIN, password: pass });
  btn.disabled = false; btn.textContent = 'Masuk';
  if (error) { errEl.textContent='Username atau password salah'; errEl.style.display='block'; return; }
  const meta = data.user?.user_metadata || {};
  sessionStorage.setItem('po_cs_name', meta.cs_name || '');
  sessionStorage.setItem('po_username', meta.username || username);
  sessionStorage.setItem('po_role', meta.role || 'cs');
  sessionStorage.setItem('po_team', meta.team || '');
  const role = meta.role || 'cs';
  window.location.href = (role === 'spv' || role === 'admin') ? '/spv.html' : '/app.html';
}
</script>
</body>
</html>
